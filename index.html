<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Burger Hero Pro</title>

  <!-- ✅ FIXED PATH -->
  <link rel="stylesheet" href="style.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">🍔 BurgerPro</div>

  <ul class="nav-links" id="navLinks">
    <li><a href="#">Home</a></li>
    <li><a href="#">Menu</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Contact</a></li>
  </ul>

  <a href="#" class="nav-btn">Order Now</a>
  <div class="hamburger" id="hamburger">&#9776;</div>
</nav>

<!-- HERO -->
<section class="hero">

  <div class="circle c1"></div>
  <div class="circle c2"></div>
  <div class="circle c3"></div>

  <div class="content">
    <p class="tag">🔥 Fresh • Juicy • Premium</p>
    <h1 class="title">The Ultimate<br><span>Burger Experience</span></h1>
    <p class="desc">
      Crafted with premium ingredients, melted cheese and signature sauces.
      Every bite delivers pure satisfaction.
    </p>

    <div class="buttons">
      <a href="#" class="btn">Order Now</a>
      <a href="#" class="btn outline">View Menu</a>
    </div>
  </div>

  <div class="image">
    <!-- ✅ FIXED PATH -->
    <img src="2.jpg" alt="burger">
  </div>

</section>

<script src="script.js"></script>

</body>
</html>
